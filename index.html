<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Darling baby</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- INTRO SCREEN -->
<div id="intro" class="screen active">
  <h1>Hello My Baby 💖</h1>
  <p>Do you want to play a game?</p>
  <div class="buttons">
    <button id="yesBtn" type="button">Yes! I want to play baby</button>
    <button id="noBtn" type="button">No, I don't want to</button>
  </div>
</div>

<!-- MAZE SCREEN -->
<div id="mazeScreen" class="screen">
  <h2>Find Me My Baby 💗</h2>
  <canvas id="mazeCanvas"></canvas>
  <div class="controls">
    <button onclick="movePlayer(0,-1)">⬆</button><br>
    <button onclick="movePlayer(-1,0)">⬅</button>
    <button onclick="movePlayer(1,0)">➡</button>
    <button onclick="movePlayer(0,1)">⬇</button>
  </div>
</div>

<!-- HUG SCREEN -->
<div id="hugScreen" class="screen">
  <div class="hug">
    <span class="girl">👩</span>
    <span class="heart">💖</span>
    <span class="boy">👨</span>
  </div>
  <p class="hugText">You found me, my baby...</p>
</div>

<!-- MESSAGE SCREEN -->
<div id="messageScreen" class="screen">
  <h2>For My Baby Zea💌</h2>
  <p id="loveMessage"></p>
</div>

<script src="script.js"></script>
</body>
</html>
